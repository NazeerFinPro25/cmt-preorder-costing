<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--surface:#161920;--surface2:#1e2230;--border:#2a2f3e;--accent:#f5a623;--text:#eef0f6;--muted:#7a8099;--green:#2ecc71;--red:#e74c3c;--blue:#4a9eff;--purple:#9b59b6}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Syne',sans-serif}
.mono{font-family:'DM Mono',monospace}
.shell{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;padding:28px 32px;overflow-y:auto}
.logo{padding:22px 18px 18px;border-bottom:1px solid var(--border)}
.logo-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--accent);letter-spacing:1px}
.logo-sub{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:2px;text-transform:uppercase}
.logo-ver{font-size:9px;color:#333;margin-top:3px;font-family:'DM Mono',monospace}
.nav{padding:14px 10px;flex:1}
.nav-section{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:10px 10px 5px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;margin-bottom:3px;border:1px solid transparent}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);background:rgba(245,166,35,.08);border-color:rgba(245,166,35,.15)}
.nav-icon{font-size:14px;width:18px;text-align:center}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.5px}
.page-title span{color:var(--accent)}
.page-sub{font-size:12.5px;color:var(--muted);margin-top:3px}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;font-family:'DM Mono',monospace}
.badge-orange{background:rgba(245,166,35,.12);color:var(--accent);border:1px solid rgba(245,166,35,.25)}
.badge-green{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.25)}
.badge-blue{background:rgba(74,158,255,.12);color:var(--blue);border:1px solid rgba(74,158,255,.25)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:20px;margin-bottom:18px}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:15px}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px;text-align:center}
.stat-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent)}
.stat-label{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;transition:all .14s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#0d0f14}.btn-primary:hover:not(:disabled){background:#e09b1a}
.btn-danger{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.25)}.btn-danger:hover:not(:disabled){background:rgba(231,76,60,.22)}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn-green{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.25)}.btn-green:hover:not(:disabled){background:rgba(46,204,113,.22)}
.btn-blue{background:rgba(74,158,255,.12);color:var(--blue);border:1px solid rgba(74,158,255,.25)}.btn-blue:hover:not(:disabled){background:rgba(74,158,255,.22)}
.btn-amber{background:rgba(245,166,35,.12);color:var(--accent);border:1px solid rgba(245,166,35,.25)}.btn-amber:hover:not(:disabled){background:rgba(245,166,35,.22)}
.btn-purple{background:rgba(155,89,182,.12);color:var(--purple);border:1px solid rgba(155,89,182,.25)}.btn-purple:hover:not(:disabled){background:rgba(155,89,182,.22)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 9px;font-size:11px;border-radius:5px}
.ag{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:480px}
th{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:9px 13px;text-align:left;border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;white-space:nowrap}
td{padding:10px 13px;font-size:13px;border-bottom:1px solid rgba(42,47,62,.4);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.grp-sub td{background:rgba(245,166,35,.04);font-size:11.5px;font-weight:700;color:var(--muted);border-top:1px solid var(--border);border-bottom:none}
.form-group{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;transition:border .14s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:60px}
.fr{display:grid;gap:13px}
.fr2{grid-template-columns:1fr 1fr}
.fr3{grid-template-columns:1fr 1fr 1fr}
.fr4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:700px){.fr2,.fr3,.fr4{grid-template-columns:1fr}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-lg{width:740px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:17px;font-weight:800}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px 6px;border-radius:4px}.modal-close:hover{color:var(--text)}
.modal-footer{display:flex;justify-content:flex-end;gap:9px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.toggle{position:relative;display:inline-flex;width:38px;height:21px;cursor:pointer;align-items:center}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:11px;transition:.2s}
.toggle input:checked+.toggle-track{background:var(--green)}
.toggle-thumb{position:absolute;height:15px;width:15px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;pointer-events:none}
.toggle input:checked~.toggle-thumb{transform:translateX(17px)}
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px 18px;font-size:13px;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,.5);animation:slideIn .22s ease;max-width:320px}
.toast-err{border-color:rgba(231,76,60,.4);color:var(--red)}
@keyframes slideIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-text{font-size:14px;color:var(--text);margin-bottom:6px}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10.5px;font-family:'DM Mono',monospace;background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.sep{height:1px;background:var(--border);margin:18px 0}
.cs-totals{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:14px 18px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.cs-tv{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:var(--accent)}
.cs-tl{font-size:10px;color:var(--muted);margin-top:2px;text-align:center}
.cs-ti{text-align:center}
.info-bar{background:linear-gradient(135deg,rgba(245,166,35,.07),rgba(232,87,42,.03));border:1px solid rgba(245,166,35,.15);border-radius:10px;padding:16px 20px;margin-bottom:18px}
.grp-header{background:var(--surface2);border:1px solid var(--border);border-radius:8px 8px 0 0;padding:8px 14px;font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:1.2px}
.grp-table{border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;overflow:hidden;margin-bottom:18px}
.rate-inp{width:115px;text-align:right;padding:5px 8px;font-size:12.5px}
.qty-inp{width:85px;text-align:right;padding:5px 8px;font-size:12.5px}
.db-note{background:rgba(46,204,113,.06);border:1px solid rgba(46,204,113,.15);border-radius:7px;padding:9px 14px;font-size:11.5px;color:var(--green);margin-bottom:18px}
/* Loading overlay */
.loading-bar{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue));z-index:9999;animation:loadpulse 1.2s ease-in-out infinite}
@keyframes loadpulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(245,166,35,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .shell{flex-direction:column}.sidebar{width:100%;height:auto;position:static}
  .nav{display:flex;flex-wrap:wrap;padding:8px;gap:3px}.nav-section{display:none}
  .nav-item{margin-bottom:0;font-size:11px;padding:6px 9px}
  .main{padding:14px}.stats-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="shell" id="app"></div>

<script>
// ═══════════════════════════════════════════════
// SUPABASE INIT
// ═══════════════════════════════════════════════
const SUPA_URL = 'https://vvqsizxmlgprygpsjmmj.supabase.co';
const SUPA_KEY = 'sb_publishable_0KenoMhDJJHmZtIEAyyg0g_M-N6WaTh';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

// ═══════════════════════════════════════════════
// APP STATE (in-memory cache)
// ═══════════════════════════════════════════════
let ST = { articles: [], contractors: [], costSheets: [] };
let VIEW = 'dashboard';
let MODAL = null, MD = {}, TOAST = null, TTM = null;
let EDIT_AID = null, CSF = {};
let LOADING = false;

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function pkr(n){ return 'PKR\u00a0'+(+n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}) }
function vEl(id){ const e=document.getElementById(id); return e?e.value:'' }
function calcTot(cs){ return (cs.items||[]).reduce((s,i)=>s+(+i.rate||0)*(+i.quantity||0),0) }
function autoSN(){ return 'CS-'+String(ST.costSheets.length+1).padStart(3,'0') }

function showLoad(){ LOADING=true; let b=document.getElementById('lbar'); if(!b){b=document.createElement('div');b.id='lbar';b.className='loading-bar';document.body.appendChild(b);} }
function hideLoad(){ LOADING=false; const b=document.getElementById('lbar'); if(b)b.remove(); }

function toast(msg, isErr=false){
  TOAST=msg; if(TTM)clearTimeout(TTM);
  let el=document.querySelector('.toast');
  if(el){el.textContent=msg;el.className='toast'+(isErr?' toast-err':'');}
  else{
    el=document.createElement('div');
    el.className='toast'+(isErr?' toast-err':'');
    el.textContent=msg;
    document.body.appendChild(el);
  }
  TTM=setTimeout(()=>{const t=document.querySelector('.toast');if(t)t.remove();},3000);
}

function nav(v){ VIEW=v; render(); window.scrollTo(0,0); }

// ═══════════════════════════════════════════════
// DATABASE FUNCTIONS
// ═══════════════════════════════════════════════

// ── ARTICLES ──
async function dbLoadArticles(){
  const {data,error}=await db.from('articles').select(`
    *,
    operation_groups ( id, name, sort_order,
      operations ( id, name, unit, approved_rate, remarks, sort_order )
    )
  `).order('created_at');
  if(error){toast('Error loading articles: '+error.message,true);return;}
  // sort groups and ops
  ST.articles=(data||[]).map(a=>({
    ...a,
    groups:(a.operation_groups||[]).sort((x,y)=>x.sort_order-y.sort_order).map(g=>({
      ...g,
      ops:(g.operations||[]).sort((x,y)=>x.sort_order-y.sort_order)
    }))
  }));
}

async function dbSaveArticle(art){
  const payload={code:art.code,name:art.name,description:art.desc||art.description||'',active:art.active!==false};
  if(art.id){
    const{error}=await db.from('articles').update(payload).eq('id',art.id);
    if(error){toast('Error: '+error.message,true);return false;}
  } else {
    const{data,error}=await db.from('articles').insert(payload).select().single();
    if(error){toast('Error: '+error.message,true);return false;}
    art.id=data.id;
    // insert default groups
    await dbInsertDefaultGroups(art.id);
  }
  await dbLoadArticles(); return true;
}

async function dbInsertDefaultGroups(artId){
  const defGroups=[
    {name:'Cutting',ops:[{name:'Fabric Cutting',unit:'Pcs',approved_rate:0,remarks:''}]},
    {name:'Stitching',ops:[{name:'Body Stitching',unit:'Pcs',approved_rate:0,remarks:''},{name:'Sleeve Attachment',unit:'Pcs',approved_rate:0,remarks:''}]},
    {name:'Finishing',ops:[{name:'Trimming',unit:'Pcs',approved_rate:0,remarks:''},{name:'Iron & Press',unit:'Pcs',approved_rate:0,remarks:''}]},
    {name:'Packing',ops:[{name:'Poly Bag & Tag',unit:'Pcs',approved_rate:0,remarks:''}]},
    {name:'QC / Inspection',ops:[{name:'Quality Check',unit:'Pcs',approved_rate:0,remarks:''}]},
  ];
  for(let gi=0;gi<defGroups.length;gi++){
    const g=defGroups[gi];
    const{data:gd,error:ge}=await db.from('operation_groups').insert({article_id:artId,name:g.name,sort_order:gi}).select().single();
    if(ge||!gd) continue;
    for(let oi=0;oi<g.ops.length;oi++){
      const o=g.ops[oi];
      await db.from('operations').insert({group_id:gd.id,article_id:artId,name:o.name,unit:o.unit,approved_rate:o.approved_rate,remarks:o.remarks,sort_order:oi});
    }
  }
}

async function dbDelArticle(id){
  const{error}=await db.from('articles').delete().eq('id',id);
  if(error){toast('Error: '+error.message,true);return false;}
  await dbLoadArticles(); return true;
}

async function dbToggleArticle(id,active){
  const{error}=await db.from('articles').update({active}).eq('id',id);
  if(error){toast('Error: '+error.message,true);}
  else { const a=ST.articles.find(x=>x.id===id); if(a) a.active=active; }
}

// ── GROUPS ──
async function dbSaveGroup(artId, grp){
  const art=ST.articles.find(a=>a.id===artId);
  const so=art?art.groups.length:0;
  if(grp.id){
    const{error}=await db.from('operation_groups').update({name:grp.name}).eq('id',grp.id);
    if(error){toast('Error: '+error.message,true);return false;}
  } else {
    const{data,error}=await db.from('operation_groups').insert({article_id:artId,name:grp.name,sort_order:so}).select().single();
    if(error){toast('Error: '+error.message,true);return false;}
    grp.id=data.id;
  }
  await dbLoadArticles(); return true;
}

async function dbDelGroup(id){
  const{error}=await db.from('operation_groups').delete().eq('id',id);
  if(error){toast('Error: '+error.message,true);return false;}
  await dbLoadArticles(); return true;
}

// ── OPERATIONS ──
async function dbSaveOp(artId, groupId, op){
  const g=ST.articles.flatMap(a=>a.groups).find(x=>x.id===groupId);
  const so=g?g.ops.length:0;
  const payload={group_id:groupId,article_id:artId,name:op.name,unit:op.unit||'Pcs',approved_rate:+op.approvedRate||0,remarks:op.remarks||''};
  if(op.id){
    const{error}=await db.from('operations').update(payload).eq('id',op.id);
    if(error){toast('Error: '+error.message,true);return false;}
  } else {
    const{error}=await db.from('operations').insert({...payload,sort_order:so});
    if(error){toast('Error: '+error.message,true);return false;}
  }
  await dbLoadArticles(); return true;
}

async function dbDelOp(id){
  const{error}=await db.from('operations').delete().eq('id',id);
  if(error){toast('Error: '+error.message,true);return false;}
  await dbLoadArticles(); return true;
}

// ── CONTRACTORS ──
async function dbLoadContractors(){
  const{data,error}=await db.from('contractors').select('*').order('created_at');
  if(error){toast('Error loading contractors: '+error.message,true);return;}
  ST.contractors=data||[];
}

async function dbSaveCon(con){
  const payload={name:con.name,location:con.location||'',contact:con.contact||'',remarks:con.remarks||'',active:con.active!==false};
  if(con.id){
    const{error}=await db.from('contractors').update(payload).eq('id',con.id);
    if(error){toast('Error: '+error.message,true);return false;}
  } else {
    const{error}=await db.from('contractors').insert(payload);
    if(error){toast('Error: '+error.message,true);return false;}
  }
  await dbLoadContractors(); return true;
}

async function dbDelCon(id){
  const{error}=await db.from('contractors').delete().eq('id',id);
  if(error){toast('Error: '+error.message,true);return false;}
  await dbLoadContractors(); return true;
}

async function dbToggleCon(id,active){
  const{error}=await db.from('contractors').update({active}).eq('id',id);
  if(error){toast('Error: '+error.message,true);}
  else { const c=ST.contractors.find(x=>x.id===id); if(c) c.active=active; }
}

// ── RATE CARDS ──
async function dbLoadRateCards(conId,artId){
  const{data,error}=await db.from('rate_cards').select('*').eq('contractor_id',conId).eq('article_id',artId);
  if(error) return {};
  const map={};
  (data||[]).forEach(r=>{ map[r.operation_id]=r.rate; });
  return map;
}

async function dbSaveRateCard(conId,artId,rates){
  // upsert all rates
  const art=ST.articles.find(a=>a.id===artId);
  if(!art) return false;
  const rows=[];
  art.groups.forEach(g=>g.ops.forEach(op=>{
    rows.push({contractor_id:conId,operation_id:op.id,article_id:artId,rate:+rates[op.id]||0});
  }));
  const{error}=await db.from('rate_cards').upsert(rows,{onConflict:'contractor_id,operation_id'});
  if(error){toast('Error: '+error.message,true);return false;}
  return true;
}

// ── COST SHEETS ──
async function dbLoadCostSheets(){
  const{data,error}=await db.from('cost_sheets').select(`
    *,
    cost_sheet_items (*)
  `).order('created_at');
  if(error){toast('Error loading cost sheets: '+error.message,true);return;}
  ST.costSheets=(data||[]).map(cs=>({
    ...cs,
    items:cs.cost_sheet_items||[]
  }));
}

async function dbSaveCS(cs, editId){
  const payload={
    sheet_no:cs.sheetNo||cs.sheet_no||autoSN(),
    date:cs.date||null,
    article_id:cs.articleId||cs.article_id,
    contractor_id:cs.contractorId||cs.contractor_id||null,
    description:cs.description||'',
    buyer:cs.buyer||'',
    season:cs.season||'',
    quantity:+cs.quantity||0
  };
  let csId=editId;
  if(editId){
    const{error}=await db.from('cost_sheets').update(payload).eq('id',editId);
    if(error){toast('Error: '+error.message,true);return false;}
    await db.from('cost_sheet_items').delete().eq('cost_sheet_id',editId);
  } else {
    const{data,error}=await db.from('cost_sheets').insert(payload).select().single();
    if(error){toast('Error: '+error.message,true);return false;}
    csId=data.id;
  }
  // insert items
  const items=[];
  (cs.groups||[]).forEach(g=>{
    (g.ops||[]).forEach(op=>{
      items.push({
        cost_sheet_id:csId,
        operation_id:op.id||op.operation_id,
        group_id:g.id||g.group_id,
        group_name:g.name,
        operation_name:op.name,
        unit:op.unit,
        approved_rate:+op.approvedRate||+op.approved_rate||0,
        rate:+op.rate||0,
        quantity:+op.qty||+op.quantity||0
      });
    });
  });
  if(items.length){
    const{error}=await db.from('cost_sheet_items').insert(items);
    if(error){toast('Error saving items: '+error.message,true);return false;}
  }
  await dbLoadCostSheets(); return true;
}

async function dbDelCS(id){
  const{error}=await db.from('cost_sheets').delete().eq('id',id);
  if(error){toast('Error: '+error.message,true);return false;}
  await dbLoadCostSheets(); return true;
}

}

function rRateComp(){
  const aArts=ST.articles.filter(a=>a.active);
  const aCons=ST.contractors.filter(c=>c.active);
  const selId=MD.rcArtId||(aArts[0]?aArts[0].id:'');
  const art=ST.articles.find(a=>a.id===selId);
  // build rate map from cost_sheet_items is not ideal; use rate_cards via MD cache
  const rcMap=MD.rcMap||{};
  return `<div class="page-header"><div><div class="page-title">Rate <span>Comparison</span></div><div class="page-sub">Contractor rates vs approved rate per operation</div></div></div>
  <div class="card" style="margin-bottom:16px"><div style="display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap">
    <div class="form-group" style="margin-bottom:0;min-width:260px"><label>Select Article</label>
    <select data-action="rc_sel_art"><option value="">— Select —</option>
    ${aArts.map(a=>`<option value="${a.id}" ${selId===a.id?'selected':''}>${esc(a.code)} · ${esc(a.name)}</option>`).join('')}
    </select></div>
    ${art&&aCons.length?`<div class="ag" style="padding-bottom:1px">
      <button class="btn btn-blue btn-sm" onclick="rcXlsExport()">📊 Excel</button>
      <button class="btn btn-amber btn-sm" onclick="rcPdfExport()">📄 PDF</button>
    </div>`:''}
  </div></div>
  ${!art?`<div class="card"><div class="empty-state"><div class="empty-icon">⇄</div><div class="empty-sub">Select an article to view comparison</div></div></div>`:
  !aCons.length?`<div class="card"><div class="empty-state"><div class="empty-icon">◎</div><div class="empty-text">No active contractors</div></div></div>`:`
  <div class="card"><div class="card-title">${esc(art.code)} · ${esc(art.name)} — Rate Comparison (PKR/Pc)</div>
  <div class="tw"><table><thead><tr><th>Group</th><th>Operation</th><th>Unit</th>
  <th style="color:var(--green)">Approved Rate</th>
  ${aCons.map(c=>`<th style="color:var(--blue)">${esc(c.name)}</th>`).join('')}
  </tr></thead><tbody>
  ${art.groups.map(g=>g.ops.map((op,oi)=>{
    const cells=aCons.map(c=>{
      const conMap=rcMap[c.id]||{};
      const rate=conMap[op.id]!==undefined?conMap[op.id]:null;
      const apr=+op.approved_rate||0;
      let sty='color:var(--muted)';
      if(rate!==null&&apr>0) sty=rate<=apr?'color:var(--green);font-weight:600':'color:var(--red);font-weight:600';
      return `<td class="mono" style="${sty}">${rate!==null?pkr(rate):'—'}</td>`;
    }).join('');
    return`<tr><td style="color:var(--muted);font-size:11.5px">${oi===0?`<span style="font-weight:700;color:var(--accent)">${esc(g.name)}</span>`:''}</td>
    <td>${esc(op.name)}</td><td><span class="chip">${esc(op.unit)}</span></td>
    <td class="mono" style="color:var(--green)">${pkr(op.approved_rate||0)}</td>${cells}</tr>`;
  }).join('')).join('')}
  </tbody></table></div>
  <div style="margin-top:10px;font-size:11px;color:var(--muted)">
    <span style="color:var(--green)">■</span> At/below approved &nbsp;
    <span style="color:var(--red)">■</span> Above approved &nbsp;
    <span style="color:var(--muted)">■</span> Not set
  </div></div>`}`;
}

function rcGetData(){
  const aArts=ST.articles.filter(a=>a.active);
  const selId=MD.rcArtId||(aArts[0]?aArts[0].id:'');
  const art=ST.articles.find(a=>a.id===selId);
  const aCons=ST.contractors.filter(c=>c.active);
  const rcMap=MD.rcMap||{};
  return{art,aCons,rcMap};
}

function rcXlsExport(){
  const{art,aCons,rcMap}=rcGetData();
  if(!art||!aCons.length){toast('⚠ Select an article first',true);return;}
  const wb=XLSX.utils.book_new();
  const rows=[
    [`RATE COMPARISON — ${art.code} · ${art.name} — PKR/Pc`],[''],
    ['Group','Operation','Unit','Approved Rate (PKR)',...aCons.map(c=>c.name)]
  ];
  art.groups.forEach(g=>{
    g.ops.forEach((op,oi)=>{
      const apr=+op.approved_rate||0;
      const conRates=aCons.map(c=>{
        const r=(rcMap[c.id]||{})[op.id];
        return r!==undefined?+r:'—';
      });
      rows.push([oi===0?g.name:'',op.name,op.unit,apr,...conRates]);
    });
    rows.push([]);
  });
  rows.push(['','','','Legend: ✓ = at/below approved  ✗ = above approved  — = not set']);
  rows.push(['','','','Generated by CMT Pre-Order Costing v2.0 | NFP NazeerFinPro']);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:16},{wch:24},{wch:8},{wch:18},...aCons.map(()=>({wch:16}))];
  XLSX.utils.book_append_sheet(wb,ws,'Rate Comparison');
  XLSX.writeFile(wb,`RateComp_${art.code}.xlsx`);
  toast('✓ Excel downloaded');
}

function rcPdfExport(){
  const{art,aCons,rcMap}=rcGetData();
  if(!art||!aCons.length){toast('⚠ Select an article first',true);return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  // Header bar
  doc.setFillColor(13,15,20);doc.rect(0,0,297,28,'F');
  doc.setTextColor(245,166,35);doc.setFontSize(13);doc.setFont('helvetica','bold');
  doc.text('RATE COMPARISON',14,11);
  doc.setFontSize(8);doc.setTextColor(122,128,153);doc.setFont('helvetica','normal');
  doc.text('NFP · NazeerFinPro  |  PKR/Pc',14,18);
  doc.setFontSize(9);doc.setTextColor(238,240,246);doc.setFont('helvetica','bold');
  doc.text(`Article: ${art.code} · ${art.name}`,100,11);
  doc.setFont('helvetica','normal');
  doc.setFontSize(7.5);doc.setTextColor(122,128,153);
  doc.text(`At/below approved = green   Above approved = red   Not set = —`,100,18);
  // Table
  const head=[['Group','Operation','Unit','Approved (PKR)',...aCons.map(c=>c.name)]];
  const body=[];
  art.groups.forEach(g=>{
    g.ops.forEach((op,oi)=>{
      const apr=+op.approved_rate||0;
      const conCells=aCons.map(c=>{
        const r=(rcMap[c.id]||{})[op.id];
        return r!==undefined?'PKR '+(+r).toLocaleString('en',{minimumFractionDigits:2}):'—';
      });
      body.push([oi===0?g.name:'',op.name,op.unit,'PKR '+apr.toLocaleString('en',{minimumFractionDigits:2}),...conCells]);
    });
  });
  doc.autoTable({
    startY:32,
    head,body,
    styles:{fontSize:7.5,cellPadding:2.2,textColor:[220,224,234],fillColor:[22,25,32],lineColor:[42,47,62],lineWidth:0.1},
    headStyles:{fillColor:[30,34,48],textColor:[122,128,153],fontStyle:'bold',fontSize:7},
    alternateRowStyles:{fillColor:[18,21,28]},
    columnStyles:{0:{cellWidth:20,fontStyle:'bold',textColor:[245,166,35]},2:{cellWidth:10},3:{cellWidth:22}},
    didParseCell:(d)=>{
      if(d.section==='body'&&d.column.index>=4){
        const conIdx=d.column.index-4;
        const con=aCons[conIdx];if(!con)return;
        const rowIdx=d.row.index;
        // find op for this row
        let ri=0;
        for(const g of art.groups){for(const op of g.ops){
          if(ri===rowIdx){
            const r=(rcMap[con.id]||{})[op.id];
            const apr=+op.approved_rate||0;
            if(r!==undefined&&apr>0){
              d.cell.styles.textColor=+r<=apr?[46,204,113]:[231,76,60];
              d.cell.styles.fontStyle='bold';
            }
          }
          ri++;
        }}
      }
    },
    margin:{left:12,right:12}
  });
  doc.setFontSize(6.5);doc.setTextColor(55,60,75);
  doc.text('CMT Pre-Order Costing v2.0 · NFP NazeerFinPro · Karachi',12,doc.internal.pageSize.height-4);
  doc.save(`RateComp_${art.code}.pdf`);
  toast('✓ PDF downloaded');
}

function csFilter(){
  const v=id=>(document.getElementById(id)?.value||'').toLowerCase().trim();
  const sn=v('cf_sn'),art=v('cf_art'),con=v('cf_con'),desc=v('cf_desc'),buyer=v('cf_buyer');
  let visible=0;
  document.querySelectorAll('#cs-tbody tr').forEach(row=>{
    const match=
      (!sn||row.dataset.sn.includes(sn))&&
      (!art||row.dataset.art.includes(art))&&
      (!con||row.dataset.con.includes(con))&&
      (!desc||row.dataset.desc.includes(desc))&&
      (!buyer||row.dataset.buyer.includes(buyer));
    row.style.display=match?'':'none';
    if(match)visible++;
  });
  const nr=document.getElementById('cs-no-results');
  if(nr)nr.style.display=visible===0?'block':'none';
}

function csClearFilters(){
  ['cf_sn','cf_art','cf_con','cf_desc','cf_buyer'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  csFilter();
}

function rNewCS(editId){
  const isEdit=!!editId;
  if(isEdit&&CSF._id!==editId){

    if(cs){
      const art=ST.articles.find(a=>a.id===cs.article_id);
      CSF={
        _id:editId,
        articleId:cs.article_id, contractorId:cs.contractor_id||'',

        buyer:cs.buyer||'', season:cs.season||'', quantity:cs.quantity||0,
        groups:art?art.groups.map(g=>({
          id:g.id,name:g.name,
          ops:g.ops.map(op=>{
            const item=cs.items.find(i=>i.operation_id===op.id);

// ═══════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════
function bind(){
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();const t=el.dataset.nav;if(t==='newcs')CSF={};nav(t);
  }));

  document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',async e=>{
    e.stopPropagation();const a=el.dataset.action;

    if(a==='close_modal'){MODAL=null;render();return;}
    if(a==='confirm_yes'){if(MD.cb)await MD.cb();else{MODAL=null;render();}return;}

    if(a==='refresh_all'){showLoad();await Promise.all([dbLoadArticles(),dbLoadContractors(),dbLoadCostSheets()]);hideLoad();render();toast('✓ Data refreshed');return;}

    // Articles
    if(a==='open_add_art'){MODAL='add_art';MD={};render();return;}
    if(a==='edit_art'){const art=ST.articles.find(x=>x.id===el.dataset.id);MODAL='edit_art';MD={...art};render();return;}
    if(a==='toggle_art'){await dbToggleArticle(el.dataset.id,el.checked);render();return;}
    if(a==='del_art'){MODAL='confirm';MD={msg:'Delete this article and all its groups?',cb:async()=>{showLoad();await dbDelArticle(el.dataset.id);hideLoad();MODAL=null;toast('✓ Deleted');render();}};render();return;}
    if(a==='save_art'){
      const code=vEl('m_code').trim(),name=vEl('m_name').trim(),desc=vEl('m_desc').trim();
      if(!code||!name){toast('⚠ Code and Name required',true);return;}
      el.disabled=true;el.innerHTML='<span class="spinner"></span>Saving...';
      const ok=await dbSaveArticle({id:MD.id,code,name,desc,active:true});
      if(ok){MODAL=null;toast('✓ Article saved');}
      render();return;
    }
    if(a==='open_ops'){EDIT_AID=el.dataset.id;nav('ops_editor');return;}

    // Groups
    if(a==='open_add_grp'){MODAL='add_grp';MD={artId:el.dataset.artid};render();return;}
    if(a==='edit_grp'){const art=ST.articles.find(x=>x.id===el.dataset.artid);const g=art?.groups.find(x=>x.id===el.dataset.gid);MODAL='edit_grp';MD={...g,artId:el.dataset.artid};render();return;}
    if(a==='del_grp'){MODAL='confirm';MD={msg:'Delete this group and all operations?',cb:async()=>{showLoad();await dbDelGroup(el.dataset.gid);hideLoad();MODAL=null;toast('✓ Deleted');render();}};render();return;}
    if(a==='save_grp'){
      const name=vEl('m_grpname').trim();if(!name){toast('⚠ Name required',true);return;}
      el.disabled=true;el.innerHTML='<span class="spinner"></span>Saving...';
      const ok=await dbSaveGroup(MD.artId,{id:MD.id,name});
      if(ok){MODAL=null;toast('✓ Group saved');}render();return;
    }

    // Ops
    if(a==='open_add_op'){const art=ST.articles.find(x=>x.id===el.dataset.artid);const g=art?.groups.find(x=>x.id===el.dataset.gid);MODAL='add_op';MD={artId:el.dataset.artid,gId:el.dataset.gid,grpName:g?g.name:''};render();return;}
    if(a==='edit_op'){const art=ST.articles.find(x=>x.id===el.dataset.artid);const g=art?.groups.find(x=>x.id===el.dataset.gid);const op=g?.ops.find(x=>x.id===el.dataset.opid);MODAL='edit_op';MD={...op,artId:el.dataset.artid,gId:el.dataset.gid,grpName:g?g.name:''};render();return;}
    if(a==='del_op'){MODAL='confirm';MD={msg:'Delete this operation?',cb:async()=>{showLoad();await dbDelOp(el.dataset.opid);hideLoad();MODAL=null;toast('✓ Deleted');render();}};render();return;}
    if(a==='save_op'){
      const name=vEl('m_opname').trim(),unit=vEl('m_opunit').trim()||'Pcs';
      const rate=parseFloat(vEl('m_oprate'))||0,remarks=vEl('m_opremarks').trim();
      if(!name){toast('⚠ Name required',true);return;}
      el.disabled=true;el.innerHTML='<span class="spinner"></span>Saving...';
      const ok=await dbSaveOp(MD.artId,MD.gId,{id:MD.id,name,unit,approvedRate:rate,remarks});
      if(ok){MODAL=null;toast('✓ Operation saved');}render();return;
    }

    // Contractors
    if(a==='open_add_con'){MODAL='add_con';MD={};render();return;}
    if(a==='edit_con'){const c=ST.contractors.find(x=>x.id===el.dataset.id);MODAL='edit_con';MD={...c};render();return;}
    if(a==='toggle_con'){await dbToggleCon(el.dataset.id,el.checked);render();return;}
    if(a==='del_con'){MODAL='confirm';MD={msg:'Delete this contractor and all rate cards?',cb:async()=>{showLoad();await dbDelCon(el.dataset.id);hideLoad();MODAL=null;toast('✓ Deleted');render();}};render();return;}
    if(a==='save_con'){
      const name=vEl('m_cname').trim();if(!name){toast('⚠ Name required',true);return;}
      el.disabled=true;el.innerHTML='<span class="spinner"></span>Saving...';
      const ok=await dbSaveCon({id:MD.id,name,location:vEl('m_cloc'),contact:vEl('m_ccont'),remarks:vEl('m_cremark')});
      if(ok){MODAL=null;toast('✓ Saved');}render();return;
    }
    if(a==='open_rc'){
      showLoad();
      const con=ST.contractors.find(c=>c.id===el.dataset.id);
      const aArts=ST.articles.filter(a=>a.active);
      const firstArt=aArts[0];
      let rcRates={};
      if(firstArt) rcRates=await dbLoadRateCards(el.dataset.id,firstArt.id);
      hideLoad();
      MODAL='rate_card';MD={conId:el.dataset.id,rcArt:firstArt?firstArt.id:'',rcRates};render();return;
    }
    if(a==='save_rc'){
      const art=ST.articles.find(x=>x.id===el.dataset.artid);if(!art)return;
      const rates={};
      art.groups.forEach(g=>g.ops.forEach(op=>{const i=document.getElementById('rc_'+op.id);if(i)rates[op.id]=parseFloat(i.value)||0;}));
      el.disabled=true;el.innerHTML='<span class="spinner"></span>Saving...';
      const ok=await dbSaveRateCard(el.dataset.conid,el.dataset.artid,rates);
      if(ok){MODAL=null;toast('✓ Rate card saved');}render();return;
    }
    // Cost Sheet
    if(a==='save_cs'){
      collectCSF();
      if(!CSF.articleId){toast('⚠ Select an article',true);return;}
      if(!CSF.groups||!CSF.groups.length){toast('⚠ No operation groups',true);return;}
      el.disabled=true;el.innerHTML='<span class="spinner"></span>Saving...';
      const eId=el.dataset.edit;
      const ok=await dbSaveCS(CSF,eId||null);
      if(ok){toast(eId?'✓ Updated':'✓ Saved');CSF={};nav('costsheets');}
      else render();return;
    }
    if(a==='view_cs'){nav('viewcs-'+el.dataset.id);return;}
    if(a==='edit_cs'){CSF={_id:el.dataset.id};nav('editcs-'+el.dataset.id);return;}
    if(a==='del_cs'){MODAL='confirm';MD={msg:'Delete this cost sheet permanently?',cb:async()=>{showLoad();await dbDelCS(el.dataset.id);hideLoad();MODAL=null;toast('✓ Deleted');render();}};render();return;}
    if(a==='dl_xls'){const cs=ST.costSheets.find(c=>c.id===el.dataset.id);if(cs)xlsExport(cs);return;}
    if(a==='dl_pdf'){const cs=ST.costSheets.find(c=>c.id===el.dataset.id);if(cs)pdfExport(cs);return;}
    if(a==='dl_xls_form'){collectCSF();xlsExport(CSF);return;}
    if(a==='dl_pdf_form'){collectCSF();pdfExport(CSF);return;}
    if(a==='open_ops'){EDIT_AID=el.dataset.id;nav('ops_editor');return;}
  }));

  // Select dropdowns — must use 'change', not 'click'
  document.querySelectorAll('select[data-action]').forEach(el=>el.addEventListener('change',async e=>{
    const a=el.dataset.action;

    if(a==='cs_sel_art'||a==='cs_sel_con'){
      collectCSF();
      if(a==='cs_sel_art') CSF.articleId=el.value;
      if(a==='cs_sel_con') CSF.contractorId=el.value;
      if(CSF.articleId){showLoad();await loadCSFGroups();hideLoad();}
      render();return;
    }
    if(a==='rc_art_sel'){
      showLoad();
      const rates=await dbLoadRateCards(MD.conId,el.value);
      hideLoad();
      MD.rcArt=el.value;MD.rcRates=rates;render();return;
    }
    if(a==='rc_sel_art'){
      showLoad();
      const aArts=ST.articles.filter(a=>a.active);
      const selCons=ST.contractors.filter(c=>c.active);
      const rcMap={};
      for(const c of selCons){rcMap[c.id]=await dbLoadRateCards(c.id,el.value);}
      hideLoad();
      MD.rcArtId=el.value;MD.rcMap=rcMap;render();return;
    }
  }));

  // Order Qty input — needs 'input' event, not 'click'
  document.querySelectorAll('input[data-action="cs_qty"]').forEach(el=>el.addEventListener('input',()=>{
    collectCSF();CSF.quantity=+el.value||0;
    if(CSF.groups)CSF.groups.forEach(g=>g.ops.forEach(o=>{if(!o._mq)o.qty=CSF.quantity;}));
    render();
  }));

  // Live inputs
  document.querySelectorAll('[data-csop-rate]').forEach(inp=>inp.addEventListener('input',()=>{
    const g=CSF.groups?.find(x=>x.id===inp.dataset.gid);const op=g?.ops.find(x=>x.id===inp.dataset.csopRate);
    if(op){op.rate=parseFloat(inp.value)||0;refreshLive();}
  }));
  document.querySelectorAll('[data-csop-qty]').forEach(inp=>inp.addEventListener('input',()=>{
    const g=CSF.groups?.find(x=>x.id===inp.dataset.gid);const op=g?.ops.find(x=>x.id===inp.dataset.csopQty);
    if(op){op.qty=parseFloat(inp.value)||0;op._mq=true;refreshLive();}
  }));
}

function refreshLive(){
  const tot=CSF.groups?CSF.groups.reduce((t,g)=>t+g.ops.reduce((s,o)=>s+(+o.rate||0)*(+o.qty||0),0),0):0;
  const qty=+CSF.quantity||0;
  CSF.groups&&CSF.groups.forEach(g=>{let sub=0;g.ops.forEach(op=>{const amt=(+op.rate||0)*(+op.qty||0);sub+=amt;const e=document.getElementById('amt_'+op.id);if(e)e.textContent=pkr(amt);});const se=document.getElementById('sub_'+g.id);if(se)se.textContent=pkr(sub);});
  const te=document.getElementById('cs_tot');if(te)te.textContent=pkr(tot);
  const pe=document.getElementById('cs_pu');if(pe)pe.textContent=qty>0?pkr(tot/qty):'—';
}

function collectCSF(){
  const g=id=>document.getElementById(id);
  if(g('f_sn'))CSF.sheetNo=g('f_sn').value;
  if(g('f_dt'))CSF.date=g('f_dt').value;
  if(g('f_art'))CSF.articleId=g('f_art').value;
  if(g('f_con'))CSF.contractorId=g('f_con').value;
  if(g('f_desc'))CSF.description=g('f_desc').value;
  if(g('f_buyer'))CSF.buyer=g('f_buyer').value;
  if(g('f_season'))CSF.season=g('f_season').value;
  if(g('f_qty'))CSF.quantity=+g('f_qty').value||0;
  if(CSF.groups)CSF.groups.forEach(grp=>grp.ops.forEach(op=>{
    const ri=document.querySelector(`[data-csop-rate="${op.id}"]`);
    const qi=document.querySelector(`[data-csop-qty="${op.id}"]`);
    if(ri)op.rate=parseFloat(ri.value)||0;
    if(qi)op.qty=parseFloat(qi.value)||0;
  }));
}

async function loadCSFGroups(){
  const art=ST.articles.find(a=>a.id===CSF.articleId);if(!art)return;
  const qty=+CSF.quantity||0;
  let rcRates={};
  if(CSF.contractorId) rcRates=await dbLoadRateCards(CSF.contractorId,CSF.articleId);
  CSF.groups=art.groups.map(g=>({
    id:g.id,name:g.name,
    ops:g.ops.map(op=>({
      id:op.id,name:op.name,unit:op.unit,
      approvedRate:op.approved_rate||0,
      rate:rcRates[op.id]||0,
      qty
    }))
  }));
}

// ═══════════════════════════════════════════════
// EXPORTS
// ═══════════════════════════════════════════════
function getExportGroups(cs){
  if(cs.groups) return cs.groups; // from form state
  const grouped={};
  (cs.items||[]).forEach(i=>{const k=i.group_name;if(!grouped[k])grouped[k]={name:k,ops:[]};grouped[k].ops.push({name:i.operation_name,unit:i.unit,approvedRate:i.approved_rate||0,rate:i.rate||0,qty:i.quantity||0});});
  return Object.values(grouped);
}

function xlsExport(cs){
  const art=ST.articles.find(a=>a.id===(cs.article_id||cs.articleId));
  const con=ST.contractors.find(c=>c.id===(cs.contractor_id||cs.contractorId));
  const groups=getExportGroups(cs);
  const tot=groups.reduce((t,g)=>t+(g.ops||[]).reduce((s,o)=>s+(+o.rate||0)*(+o.qty||+o.quantity||0),0),0);
  const qty=+cs.quantity||0;
  const wb=XLSX.utils.book_new();
  const rows=[
    ['CMT PRE-ORDER COST SHEET — NFP NazeerFinPro · PKR'],[''],
    ['Sheet #:',cs.sheet_no||cs.sheetNo||'Draft','Date:',cs.date||''],
    ['Article:',art?art.code+' · '+art.name:'?','Contractor:',con?con.name:'—'],
    ['Description:',cs.description||'','Buyer:',cs.buyer||''],
    ['Season:',cs.season||'','Order Qty (Pcs):',qty],[''],
    ['GROUP','#','OPERATION','UNIT','APPROVED RATE','RATE (PKR)','QTY (PCS)','AMOUNT (PKR)']
  ];
  groups.forEach(g=>{
    (g.ops||[]).forEach((op,i)=>{const q=+op.qty||+op.quantity||0;rows.push([i===0?g.name:'',i+1,op.name,op.unit,+op.approvedRate||+op.approved_rate||0,+op.rate||0,q,(+op.rate||0)*q]);});
    const sub=(g.ops||[]).reduce((s,o)=>s+(+o.rate||0)*(+o.qty||+o.quantity||0),0);
    rows.push(['','','','','','Group Subtotal:','',sub]);rows.push(['']);
  });
  rows.push(['','','','','','TOTAL CMT COST (PKR):','',tot]);
  rows.push(['','','','','','PER UNIT COST (PKR):','',qty>0?tot/qty:0]);
  rows.push(['','','','','','ORDER QTY (PCS):','',qty]);
  rows.push(['']);rows.push(['Generated by CMT Pre-Order Costing v2.0 | NFP NazeerFinPro']);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:18},{wch:4},{wch:24},{wch:8},{wch:16},{wch:16},{wch:12},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws,'Cost Sheet');
  XLSX.writeFile(wb,`CMT_${cs.sheet_no||cs.sheetNo||'Draft'}.xlsx`);
  toast('✓ Excel downloaded');
}

function pdfExport(cs){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const art=ST.articles.find(a=>a.id===(cs.article_id||cs.articleId));
  const con=ST.contractors.find(c=>c.id===(cs.contractor_id||cs.contractorId));
  const groups=getExportGroups(cs);
  const tot=groups.reduce((t,g)=>t+(g.ops||[]).reduce((s,o)=>s+(+o.rate||0)*(+o.qty||+o.quantity||0),0),0);
  const qty=+cs.quantity||0;
  doc.setFillColor(13,15,20);doc.rect(0,0,210,32,'F');
  doc.setTextColor(245,166,35);doc.setFontSize(14);doc.setFont('helvetica','bold');doc.text('CMT PRE-ORDER COST SHEET',14,11);
  doc.setFontSize(8);doc.setTextColor(122,128,153);doc.setFont('helvetica','normal');doc.text('NFP \u00b7 NazeerFinPro  |  Cut \u00b7 Make \u00b7 Trim Costing  |  PKR',14,18);
  doc.setFontSize(9);doc.setTextColor(238,240,246);doc.setFont('helvetica','bold');
  doc.text('Sheet: '+(cs.sheet_no||cs.sheetNo||'Draft'),14,26);doc.text('Date: '+(cs.date||'N/A'),80,26);doc.setFont('helvetica','normal');
  doc.setFillColor(22,25,32);doc.rect(0,32,210,28,'F');
  const info=[['ARTICLE',art?art.code+' \u00b7 '+art.name:'?','CONTRACTOR',con?con.name:'\u2014'],['BUYER',cs.buyer||'\u2014','SEASON',cs.season||'\u2014'],['DESCRIPTION',cs.description||'\u2014','ORDER QTY',qty.toLocaleString()+' Pcs']];
  info.forEach((row,ri)=>{const y=39+(ri*8);[[14,row[0],row[1]],[110,row[2],row[3]]].forEach(([x,lbl,val])=>{doc.setFontSize(7);doc.setTextColor(122,128,153);doc.text(lbl,x,y);doc.setFontSize(8);doc.setTextColor(238,240,246);doc.setFont('helvetica','bold');doc.text(String(val),x,y+4.5);doc.setFont('helvetica','normal');});});
  let sY=64;
  groups.forEach(g=>{
    const body=(g.ops||[]).map((op,i)=>{const q=+op.qty||+op.quantity||0;return[String(i+1).padStart(2,'0'),op.name,op.unit,'PKR '+(+op.approvedRate||+op.approved_rate||0).toLocaleString('en',{minimumFractionDigits:2}),'PKR '+(+op.rate||0).toLocaleString('en',{minimumFractionDigits:2}),q.toLocaleString(),'PKR '+((+op.rate||0)*q).toLocaleString('en',{minimumFractionDigits:2})];});
    const sub=(g.ops||[]).reduce((s,o)=>s+(+o.rate||0)*(+o.qty||+o.quantity||0),0);
    body.push(['','','','','Subtotal:','','PKR '+sub.toLocaleString('en',{minimumFractionDigits:2})]);
    doc.autoTable({startY:sY,head:[[{content:g.name,colSpan:7,styles:{fillColor:[30,34,48],textColor:[245,166,35],fontStyle:'bold',fontSize:8.5}}],['#','Operation','Unit','Approved','Rate (PKR)','Qty','Amount (PKR)']],body,styles:{fontSize:8.5,cellPadding:2.5,textColor:[220,224,234],fillColor:[22,25,32],lineColor:[42,47,62],lineWidth:0.1},headStyles:{fillColor:[30,34,48],textColor:[122,128,153],fontStyle:'bold',fontSize:7.5},alternateRowStyles:{fillColor:[18,21,28]},columnStyles:{0:{cellWidth:8},2:{cellWidth:11},3:{cellWidth:24},4:{cellWidth:24},5:{cellWidth:16},6:{cellWidth:28}},didParseCell:(d)=>{if(d.row.index===body.length-1){d.cell.styles.textColor=[245,166,35];d.cell.styles.fontStyle='bold';}},margin:{left:12,right:12}});
    sY=doc.lastAutoTable.finalY+3;
  });
  const fy=sY+3;doc.setFillColor(30,34,48);doc.rect(12,fy,186,24,'F');doc.setDrawColor(245,166,35);doc.setLineWidth(0.35);doc.rect(12,fy,186,24,'S');
  doc.setDrawColor(42,47,62);doc.setLineWidth(0.15);doc.line(76,fy,76,fy+24);doc.line(140,fy,140,fy+24);
  doc.setFontSize(7);doc.setTextColor(122,128,153);doc.text('TOTAL CMT COST',18,fy+7);doc.text('PER UNIT COST',82,fy+7);doc.text('ORDER QTY (PCS)',146,fy+7);
  doc.setFontSize(11);doc.setTextColor(245,166,35);doc.setFont('helvetica','bold');
  doc.text('PKR '+tot.toLocaleString('en',{minimumFractionDigits:2}),18,fy+18);
  doc.text(qty>0?'PKR '+(tot/qty).toLocaleString('en',{minimumFractionDigits:2}):'\u2014',82,fy+18);
  doc.setTextColor(238,240,246);doc.text(qty.toLocaleString(),146,fy+18);doc.setFont('helvetica','normal');
  doc.setFontSize(6.5);doc.setTextColor(55,60,75);doc.text('CMT Pre-Order Costing v2.0 \u00b7 NFP NazeerFinPro \u00b7 Karachi',12,292);
  doc.save(`CMT_${cs.sheet_no||cs.sheetNo||'Draft'}.pdf`);
  toast('✓ PDF downloaded');
}

document.getElementById('app').innerHTML=`
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;background:var(--bg)">
    <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent)">CMT COSTING</div>
    <div style="font-size:13px;color:var(--muted)">Connecting to Supabase...</div>
    <div style="width:200px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden">
      <div style="height:100%;background:var(--accent);animation:loadpulse 1.2s ease-in-out infinite"></div>

initLoad();
